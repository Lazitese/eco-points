name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'

      - name: Get Flutter packages
        run: flutter pub get

      - name: Clean build
        run: flutter clean

      - name: Build APK (verbose)
        run: flutter build apk --release -v 2>&1 | tail -n 150

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eco-points-apk
          path: build/app/outputs/flutter-apk/app-release.apk
